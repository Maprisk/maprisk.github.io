<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MapRisk - Interactive Florida Map with Directions & Animation</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<!-- Leaflet Control Geocoder CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
<!-- Leaflet Routing Machine CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<!-- Georaster libraries for GeoTIFF overlay -->
<script src="https://unpkg.com/geotiff/dist/geotiff.browser.min.js"></script>
<script src="https://unpkg.com/georaster"></script>
<script src="https://unpkg.com/georaster-layer-for-leaflet"></script>
<!-- Leaflet Control Geocoder JS -->
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<!-- Leaflet Routing Machine JS -->
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.min.js"></script>

<style>
  body { margin:0; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  #map { height:100vh; width:100%; }
  .legend {
    background:white;
    padding:10px;
    border-radius:6px;
    box-shadow:0 2px 6px rgba(0,0,0,0.15);
    font-size:13px;
    line-height:1.4;
  }
  .legend .key { display:inline-block; width:14px; height:14px; margin-right:6px; vertical-align:middle; }
</style>
</head>
<body>

<div id="map"></div>

<script>
// --- Initialize map ---
var map = L.map('map').setView([27.8,-81.5],6);

// Base map
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom:18,
  attribution:'&copy; OpenStreetMap contributors'
}).addTo(map);

// --- Search bar ---
L.Control.geocoder({
    defaultMarkGeocode: true,
    placeholder: "Search location...",
    position: 'topright',
    geocoder: L.Control.Geocoder.nominatim()
}).addTo(map);

// --- City markers ---
var cities = [
  {name:"Miami", coords:[25.7617,-80.1918]},
  {name:"Orlando", coords:[28.5383,-81.3792]},
  {name:"Tampa", coords:[27.9506,-82.4572]},
  {name:"Jacksonville", coords:[30.3322,-81.6557]},
  {name:"Tallahassee", coords:[30.4383,-84.2807]}
];
cities.forEach(function(city){
  L.marker(city.coords).addTo(map).bindPopup('<strong>'+city.name+'</strong>');
});

// --- Hurricane cone ---
var leftEdge = [[24.8,-83.6],[25.6,-83.0],[26.6,-82.0],[27.6,-80.6],[29.0,-79.8]];
var rightEdge = [[24.8,-81.2],[25.6,-80.6],[26.6,-79.6],[27.6,-78.8],[29.0,-78.6]];
var coneCoords = leftEdge.concat(rightEdge.slice().reverse());
var coneLayer = L.polygon(coneCoords,{
  color:'#ff4500',
  weight:2,
  fillColor:'#ff6b00',
  fillOpacity:0.5
}).bindPopup("Hurricane cone (demo)").addTo(map);

// --- Uncertainty circles ---
var forecastPoints = [
  {lat:25.6,lng:-82.8,radius_m:60000,time:"T+0"},
  {lat:27.2,lng:-81.0,radius_m:120000,time:"T+12h"},
  {lat:29.0,lng:-79.4,radius_m:240000,time:"T+36h"}
];
var uncertaintyLayer = L.layerGroup();
forecastPoints.forEach(function(pt){
  L.circle([pt.lat,pt.lng],{
    radius:pt.radius_m,
    color:'#1e90ff',
    weight:2,
    fillColor:'#87cefa',
    fillOpacity:0.5
  }).bindPopup(pt.time+" uncertainty radius").addTo(uncertaintyLayer);
});
uncertaintyLayer.addTo(map);

// --- GeoTIFF overlay ---
fetch("data/hurricane_risk.tif")
.then(r=>r.arrayBuffer())
.then(arrayBuffer=>georaster(arrayBuffer))
.then(georaster=>{
  var geotiffLayer = new GeoRasterLayer({
    georaster:georaster,
    opacity:0.5,
    pixelValuesToColorFn: function(values){
      var v = values[0] || 0;
      if(v<0.33) return "#00ff00";
      if(v<0.66) return "#ffff00";
      return "#ff0000";
    },
    resolution:128
  });
  geotiffLayer.addTo(map);
  addLayersControl(geotiffLayer);
});

// --- Layer control ---
function addLayersControl(geotiffLayer){
  var overlayControls = {
    "Hurricane cone": coneLayer,
    "Uncertainty circles": uncertaintyLayer,
    "GeoTIFF risk": geotiffLayer
  };
  L.control.layers(null,overlayControls,{collapsed:false}).addTo(map);
}

// --- Routing/Directions ---
var routingControl = L.Routing.control({
    waypoints: [],
    routeWhileDragging: true,
    geocoder: L.Control.Geocoder.nominatim(),
    show: true
}).addTo(map);

// Optional: use browser GPS as start
if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(function(position){
    var userLatLng = L.latLng(position.coords.latitude, position.coords.longitude);
    routingControl.setWaypoints([userLatLng]);
  });
}

// --- Animated marker along route ---
var movingMarker;

routingControl.on('routesfound', function(e) {
    var route = e.routes[0];
    var coords = route.coordinates;

    if(movingMarker) map.removeLayer(movingMarker);

    movingMarker = L.marker(coords[0]).addTo(map);

    var index = 0;
    var speed = 200; // ms per step

    function move(){
        if(index < coords.length){
            movingMarker.setLatLng(coords[index]);
            index++;
            setTimeout(move, speed);
        }
    }
    move();
});

// --- Legend ---
var legend = L.control({position:'topright'});
legend.onAdd = function(){
  var div = L.DomUtil.create('div','legend');
  div.innerHTML += '<div style="font-weight:bold;margin-bottom:6px;">Map legend</div>';
  div.innerHTML += '<div><span class="key" style="background:#ff6b00;border:1px solid #ff4500"></span> Hurricane cone</div>';
  div.innerHTML += '<div><span class="key" style="background:#87cefa;border:1px solid #1e90ff"></span> Uncertainty circles</div>';
  div.innerHTML += '<div><span class="key" style="background:#ff0000;border:1px solid #aa0000"></span> High risk (GeoTIFF)</div>';
  div.innerHTML += '<div><span class="key" style="background:#ffff00;border:1px solid #aaaa00"></span> Medium risk (GeoTIFF)</div>';
  div.innerHTML += '<div><span class="key" style="background:#00ff00;border:1px solid #00aa00"></span> Low risk (GeoTIFF)</div>';
  div.innerHTML += '<div><span class="key" style="background:#0000ff;border:1px solid #0000ff"></span> Animated route marker</div>';
  return div;
};
legend.addTo(map);

</script>
</body>
</html>
