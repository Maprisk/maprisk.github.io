<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MapRisk - Florida Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }
    #map {
      height: 100vh;
      width: 100%;
    }
    .leaflet-control-attribution {
      display: none;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    // Create the map centered on Florida
    var map = L.map('map').setView([27.6648, -81.5158], 6);

    // Add base map layer
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18
    }).addTo(map);

    // Example markers
    var cities = [
      { name: "Miami", coords: [25.7617, -80.1918] },
      { name: "Orlando", coords: [28.5383, -81.3792] },
      { name: "Tampa", coords: [27.9506, -82.4572] },
      { name: "Jacksonville", coords: [30.3322, -81.6557] },
      { name: "Tallahassee", coords: [30.4383, -84.2807] }
    ];

    cities.forEach(city => {
      L.marker(city.coords).addTo(map).bindPopup(`<b>${city.name}</b>`);
    });
  </script>
</body>
</html>
